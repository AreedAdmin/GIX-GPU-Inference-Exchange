<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" role="img" aria-label="GIX architecture: demand (consumer/SDK) and supply (provider node + TEE) meet on a DeepBook CLOB; the Sui gix package escrows, verifies attestation, and settles; Walrus stores content-addressed artifacts.">
  <defs>
    <pattern id="grid2" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#ECEFF3" stroke-width="1"/>
    </pattern>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0L9 4.5L0 9z" fill="#79828F"/></marker>
    <marker id="ahb" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0L9 4.5L0 9z" fill="#2D5BE3"/></marker>
  </defs>

  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect width="1280" height="720" fill="url(#grid2)"/>

  <!-- header -->
  <text x="64" y="74" font-size="22" font-weight="800" letter-spacing="2" fill="#0E1116">GIX</text>
  <text x="1216" y="74" text-anchor="end" font-size="12.5" letter-spacing="2.5" fill="#79828F" font-family="ui-monospace, 'SF Mono', Menlo, monospace">ARCHITECTURE&#160;·&#160;02</text>
  <line x1="64" y1="100" x2="1216" y2="100" stroke="#E4E8ED" stroke-width="1.5"/>
  <text x="64" y="142" font-size="27" font-weight="700" fill="#0E1116">Off-chain convenience, on-chain authority</text>
  <text x="64" y="166" font-size="15.5" fill="#79828F">Settlement is decided solely by verified attestation — no off-chain service can move funds or fake a result.</text>

  <!-- DEMAND rail -->
  <text x="70" y="196" font-size="11.5" letter-spacing="2" fill="#9AA2AD" font-family="ui-monospace,Menlo,monospace">DEMAND</text>
  <g>
    <rect x="70" y="206" width="190" height="60" rx="8" fill="#F6F8FA" stroke="#D2D8E0"/>
    <text x="165" y="242" text-anchor="middle" font-size="15.5" font-weight="600" fill="#1A1F2B">Consumer app</text>
    <rect x="70" y="300" width="190" height="60" rx="8" fill="#F6F8FA" stroke="#D2D8E0"/>
    <text x="165" y="329" text-anchor="middle" font-size="14.5" font-weight="600" fill="#1A1F2B">GIX SDK</text>
    <text x="165" y="348" text-anchor="middle" font-size="12" fill="#79828F" font-family="ui-monospace,Menlo,monospace">OpenAI-compatible API</text>
  </g>

  <!-- SUPPLY rail -->
  <text x="1210" y="196" text-anchor="end" font-size="11.5" letter-spacing="2" fill="#9AA2AD" font-family="ui-monospace,Menlo,monospace">SUPPLY</text>
  <g>
    <rect x="1020" y="206" width="190" height="60" rx="8" fill="#F6F8FA" stroke="#D2D8E0"/>
    <text x="1115" y="242" text-anchor="middle" font-size="15.5" font-weight="600" fill="#1A1F2B">Provider node</text>
    <rect x="1020" y="300" width="190" height="60" rx="8" fill="#EAF0FF" stroke="#2D5BE3"/>
    <text x="1115" y="329" text-anchor="middle" font-size="14.5" font-weight="700" fill="#1A2A66">TEE · GPU</text>
    <text x="1115" y="348" text-anchor="middle" font-size="12" fill="#3D5AAE" font-family="ui-monospace,Menlo,monospace">H100&#160;CC&#160;/&#160;Intel&#160;TDX</text>
  </g>

  <!-- CENTER: matching band -->
  <rect x="300" y="178" width="680" height="74" rx="10" fill="#FFFFFF" stroke="#D2D8E0" stroke-width="1.5"/>
  <text x="640" y="210" text-anchor="middle" font-size="17" font-weight="700" fill="#0E1116">DeepBook v3 · CLOB</text>
  <text x="640" y="233" text-anchor="middle" font-size="13" fill="#79828F" font-family="ui-monospace,Menlo,monospace">Credit⟨M⟩ / USDC&#160;&#160;·&#160;&#160;price-time priority&#160;·&#160;live spot price</text>

  <!-- CENTER: Sui gix authority -->
  <rect x="300" y="300" width="680" height="170" rx="12" fill="#FBFCFE" stroke="#2D5BE3" stroke-width="1.75"/>
  <text x="320" y="330" font-size="15" font-weight="800" letter-spacing="0.5" fill="#1A2A66">Sui · gix package</text>
  <text x="960" y="330" text-anchor="end" font-size="11.5" letter-spacing="1.5" fill="#3D5AAE" font-family="ui-monospace,Menlo,monospace">THE&#160;SETTLEMENT&#160;AUTHORITY</text>
  <g>
    <rect x="320" y="348" width="196" height="104" rx="8" fill="#FFFFFF" stroke="#D2D8E0"/>
    <text x="418" y="392" text-anchor="middle" font-size="22" font-weight="800" fill="#2D5BE3">①</text>
    <text x="418" y="420" text-anchor="middle" font-size="14.5" font-weight="600" fill="#1A1F2B">Escrow + Job</text>
    <text x="418" y="439" text-anchor="middle" font-size="11.5" fill="#79828F">lock USDC</text>

    <rect x="542" y="348" width="196" height="104" rx="8" fill="#FFFFFF" stroke="#D2D8E0"/>
    <text x="640" y="392" text-anchor="middle" font-size="22" font-weight="800" fill="#2D5BE3">②</text>
    <text x="640" y="420" text-anchor="middle" font-size="14.5" font-weight="600" fill="#1A1F2B">Verify attestation</text>
    <text x="640" y="439" text-anchor="middle" font-size="11.5" fill="#79828F">sig · measurement · hashes</text>

    <rect x="764" y="348" width="196" height="104" rx="8" fill="#FFFFFF" stroke="#D2D8E0"/>
    <text x="862" y="392" text-anchor="middle" font-size="22" font-weight="800" fill="#2D5BE3">③</text>
    <text x="862" y="420" text-anchor="middle" font-size="14.5" font-weight="600" fill="#1A1F2B">Settle / Slash</text>
    <text x="862" y="439" text-anchor="middle" font-size="11.5" fill="#79828F">pay · refund · slash</text>
  </g>

  <!-- CENTER: Walrus -->
  <rect x="300" y="516" width="680" height="74" rx="10" fill="#FFFFFF" stroke="#D2D8E0" stroke-width="1.5"/>
  <text x="640" y="548" text-anchor="middle" font-size="17" font-weight="700" fill="#0E1116">Walrus · content-addressed storage</text>
  <text x="640" y="571" text-anchor="middle" font-size="13" fill="#79828F" font-family="ui-monospace,Menlo,monospace">model · input · output · quote&#160;&#160;→&#160;&#160;tamper-evident audit trail</text>

  <!-- ARROWS -->
  <g font-family="ui-monospace,Menlo,monospace" font-size="11.5">
    <!-- bid / ask into DeepBook -->
    <line x1="261" y1="226" x2="298" y2="218" stroke="#79828F" stroke-width="1.5" marker-end="url(#ah)"/>
    <text x="266" y="206" fill="#5B6573">bid</text>
    <line x1="1019" y1="226" x2="982" y2="218" stroke="#79828F" stroke-width="1.5" marker-end="url(#ah)"/>
    <text x="985" y="206" text-anchor="end" fill="#5B6573">ask</text>

    <!-- fill -> Job -->
    <line x1="640" y1="252" x2="640" y2="298" stroke="#2D5BE3" stroke-width="2" marker-end="url(#ahb)"/>
    <rect x="600" y="266" width="118" height="18" fill="#FFFFFF"/>
    <text x="659" y="279" text-anchor="middle" fill="#2D5BE3">fill → Job + escrow</text>

    <!-- settle / refund -> consumer -->
    <line x1="299" y1="372" x2="262" y2="338" stroke="#2D5BE3" stroke-width="2" marker-end="url(#ahb)"/>
    <rect x="246" y="372" width="92" height="18" fill="#FFFFFF"/>
    <text x="292" y="385" text-anchor="middle" fill="#2D5BE3">settle / refund</text>

    <!-- dispatch -> provider node -->
    <line x1="981" y1="356" x2="1018" y2="252" stroke="#79828F" stroke-width="1.5" marker-end="url(#ah)"/>
    <rect x="980" y="298" width="74" height="18" fill="#FFFFFF"/>
    <text x="1017" y="311" text-anchor="middle" fill="#5B6573">dispatch</text>

    <!-- attestation -> verify -->
    <line x1="1019" y1="392" x2="962" y2="404" stroke="#79828F" stroke-width="1.5" marker-end="url(#ah)"/>
    <rect x="968" y="430" width="92" height="18" fill="#FFFFFF"/>
    <text x="1014" y="443" text-anchor="middle" fill="#5B6573">attestation</text>

    <!-- input -> walrus -->
    <line x1="262" y1="360" x2="299" y2="540" stroke="#79828F" stroke-width="1.5" marker-end="url(#ah)"/>
    <rect x="244" y="486" width="78" height="18" fill="#FFFFFF"/>
    <text x="283" y="499" text-anchor="middle" fill="#5B6573">input</text>

    <!-- output+quote -> walrus -->
    <line x1="1018" y1="362" x2="981" y2="540" stroke="#79828F" stroke-width="1.5" marker-end="url(#ah)"/>
    <rect x="956" y="486" width="106" height="18" fill="#FFFFFF"/>
    <text x="1009" y="499" text-anchor="middle" fill="#5B6573">output + quote</text>

    <!-- hashes Sui <-> Walrus -->
    <line x1="640" y1="470" x2="640" y2="514" stroke="#79828F" stroke-width="1.5" marker-end="url(#ah)"/>
    <rect x="612" y="482" width="56" height="18" fill="#FFFFFF"/>
    <text x="640" y="495" text-anchor="middle" fill="#5B6573">hashes</text>
  </g>

  <!-- footer -->
  <line x1="64" y1="640" x2="1216" y2="640" stroke="#E4E8ED" stroke-width="1.5"/>
  <text x="64" y="668" font-size="12" letter-spacing="1.5" fill="#9AA2AD" font-family="ui-monospace,Menlo,monospace">CONTRACTS:&#160;MOVE&#160;·&#160;NODE/SDK/GATEWAY:&#160;TYPESCRIPT</text>
  <text x="1216" y="668" text-anchor="end" font-size="12" letter-spacing="1.5" fill="#9AA2AD" font-family="ui-monospace,Menlo,monospace">DISJOINT&#160;JOBS&#160;→&#160;PARALLEL&#160;SETTLEMENT</text>
</svg>
