<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" role="img" aria-label="Status: end-to-end built and live on Sui testnet through milestone M2 (DeepBook matching plus Walrus storage). Next: real TEE attestation, audit, mainnet.">
