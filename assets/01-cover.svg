<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" role="img" aria-label="GIX — GPU Inference Exchange. A decentralized spot market for verifiable GPU inference, settled on Sui.">
  <defs>
    <pattern id="grid1" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#ECEFF3" stroke-width="1"/>
    </pattern>
    <linearGradient id="fade1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0.45" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.92"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect width="1280" height="720" fill="url(#grid1)"/>

  <!-- right-side node network motif -->
  <g stroke="#C9D6F7" stroke-width="1.25" opacity="0.9">
    <line x1="980" y1="150" x2="1110" y2="232"/>
    <line x1="1110" y1="232" x2="1040" y2="360"/>
    <line x1="1040" y1="360" x2="1170" y2="420"/>
    <line x1="980" y1="150" x2="1040" y2="360"/>
    <line x1="1110" y1="232" x2="1210" y2="320"/>
    <line x1="1040" y1="360" x2="980" y2="500"/>
    <line x1="1170" y1="420" x2="1090" y2="540"/>
    <line x1="980" y1="500" x2="1090" y2="540"/>
    <line x1="1210" y1="320" x2="1170" y2="420"/>
    <line x1="900" y1="300" x2="1040" y2="360"/>
    <line x1="900" y1="300" x2="980" y2="150"/>
  </g>
  <g fill="#FFFFFF" stroke="#2D5BE3" stroke-width="2">
    <circle cx="980" cy="150" r="7"/><circle cx="1110" cy="232" r="9"/>
    <circle cx="1040" cy="360" r="11"/><circle cx="1170" cy="420" r="7"/>
    <circle cx="1210" cy="320" r="6"/><circle cx="980" cy="500" r="8"/>
    <circle cx="1090" cy="540" r="7"/><circle cx="900" cy="300" r="6"/>
  </g>
  <g fill="#2D5BE3"><circle cx="1040" cy="360" r="4"/><circle cx="1110" cy="232" r="3.5"/></g>
  <rect x="820" y="0" width="460" height="720" fill="url(#fade1)"/>

  <!-- header -->
  <text x="64" y="74" font-size="22" font-weight="800" letter-spacing="2" fill="#0E1116">GIX</text>
  <text x="108" y="74" font-size="12.5" letter-spacing="3" fill="#79828F" font-family="ui-monospace, 'SF Mono', Menlo, monospace">GPU&#160;INFERENCE&#160;EXCHANGE</text>
  <text x="1216" y="74" text-anchor="end" font-size="12.5" letter-spacing="2.5" fill="#79828F" font-family="ui-monospace, 'SF Mono', Menlo, monospace">INVESTOR&#160;BRIEF&#160;·&#160;01</text>
  <line x1="64" y1="100" x2="1216" y2="100" stroke="#E4E8ED" stroke-width="1.5"/>

  <!-- hero -->
  <text x="62" y="300" font-size="150" font-weight="800" letter-spacing="-4" fill="#0E1116">GIX</text>
  <rect x="66" y="330" width="64" height="6" fill="#2D5BE3"/>
  <text x="64" y="392" font-size="34" font-weight="700" fill="#1A1F2B">The spot market for GPU inference.</text>
  <text x="64" y="440" font-size="22" fill="#5B6573">A decentralized, hardware-verified exchange where compute is</text>
  <text x="64" y="470" font-size="22" fill="#5B6573">priced, traded, and settled per inference — on <tspan font-weight="700" fill="#1A1F2B">Sui</tspan>.</text>

  <!-- three pillars -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, monospace">
    <line x1="64" y1="540" x2="1040" y2="540" stroke="#E4E8ED" stroke-width="1.5"/>

    <text x="64" y="582" font-size="13" letter-spacing="2" fill="#2D5BE3">01 · MATCH</text>
    <text x="64" y="610" font-size="19" font-family="Inter, Arial, sans-serif" font-weight="700" fill="#0E1116">DeepBook CLOB</text>
    <text x="64" y="634" font-size="13.5" font-family="Inter, Arial, sans-serif" fill="#79828F">Live spot price per market</text>

    <text x="392" y="582" font-size="13" letter-spacing="2" fill="#2D5BE3">02 · VERIFY</text>
    <text x="392" y="610" font-size="19" font-family="Inter, Arial, sans-serif" font-weight="700" fill="#0E1116">TEE attestation</text>
    <text x="392" y="634" font-size="13.5" font-family="Inter, Arial, sans-serif" fill="#79828F">Proven on-chain, no trust</text>

    <text x="720" y="582" font-size="13" letter-spacing="2" fill="#2D5BE3">03 · SETTLE</text>
    <text x="720" y="610" font-size="19" font-family="Inter, Arial, sans-serif" font-weight="700" fill="#0E1116">USDC escrow + Walrus</text>
    <text x="720" y="634" font-size="13.5" font-family="Inter, Arial, sans-serif" fill="#79828F">Pay only for proven work</text>
  </g>

  <!-- footer -->
  <line x1="64" y1="664" x2="1216" y2="664" stroke="#E4E8ED" stroke-width="1.5"/>
  <text x="64" y="690" font-size="12" letter-spacing="1.5" fill="#9AA2AD" font-family="ui-monospace, 'SF Mono', Menlo, monospace">SUI&#160;·&#160;DEEPBOOK&#160;·&#160;WALRUS</text>
  <text x="1216" y="690" text-anchor="end" font-size="12" letter-spacing="1.5" fill="#9AA2AD" font-family="ui-monospace, 'SF Mono', Menlo, monospace">LIVE&#160;ON&#160;TESTNET</text>
</svg>
